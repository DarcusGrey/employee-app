name: Build and Package Native Image

on:
  push:
    branches:
      - main 
  workflow_dispatch: # Allows to trigger the build manually from GitHub UI

jobs:
  build-native:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the application source code
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up GraalVM environment on the runner
    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '17' 
        distribution: 'graalvm'
        cache: 'maven'  

    # Step 3: Install static compression libraries for Distroless linking
    - name: Install zlib static library
      run: sudo apt-get update && sudo apt-get install -y zlib1g-dev

    # Step 4: Build the Native Binary using your PGO profile
    - name: Compile Native Binary with PGO
      run: |
        ./mvnw -Pnative,optimize clean native:compile -Dmaven.test.skip=true 

    # Step 5: Set up Docker Buildx (required for modern Docker features)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Step 6: Pull the secrets and authenticate with Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Step 7: Build and Push the Docker Image
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        # Change this accordingly to what and where you want.
        file: ./app_graal.Dockerfile
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/employee-app:latest
        push: true 