services:
  db:
    image: postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - mynet
    env_file:
      - .env

  server:
    build:
      context: .
      dockerfile: app.Dockerfile    
      # dockerfile: app_graal.Dockerfile
      # dockerfile: app_graal_redhat.Dockerfile
    # image: employee_graal:native
    networks: 
      - mynet
    ports:
      - "8080:8080"
    depends_on:
      - db
    env_file:
      - .env
    
volumes:
  pgdata:

networks:
  mynet:
    driver: bridge
  